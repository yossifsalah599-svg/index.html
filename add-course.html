<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Add New Course</h1></header>
    <nav>
        <a href="index.html">Home</a>
        <a href="my-courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>
    <main>
        <form>
            <div class="form-group">
                <label>Course Name:</label>
                <input type="text" placeholder="Enter course name" required>
            </div>
            <div class="form-group">
                <label>Instructor:</label>
                <input type="text" placeholder="Instructor name">
            </div>
            <div class="form-group">
                <label>Credit Hours:</label>
                <input type="number" min="1" max="5">
            </div>
            <div class="form-group">
                <label>Notes:</label>
                <textarea rows="4"></textarea>
            </div>
            <button type="submit">Save Course</button>
        </form>
    </main>
    <footer><p>&copy; 2026 Personal Course Organizer</p></footer>
</body>
</html>
